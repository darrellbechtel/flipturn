# Note: top-level `name:` field omitted for compatibility with older docker compose
# (<2.3.3). The project name defaults to the directory name (`flipturn`), which is fine —
# container_name and volume names below are explicit, so the project-name prefix
# only affects the default network and is otherwise invisible.
services:
  postgres:
    image: postgres:16-alpine
    container_name: flipturn-postgres
    # Resume on Docker daemon start (e.g. when OrbStack auto-starts at login)
    # so the Mac Mini deploy doesn't need a manual `compose up` after reboot.
    restart: unless-stopped
    environment:
      POSTGRES_USER: flipturn
      POSTGRES_PASSWORD: flipturn_dev
      POSTGRES_DB: flipturn
    ports:
      # Mapped to 55432 on the host to avoid colliding with a host-installed
      # Postgres that may already be listening on 5432.
      - '55432:5432'
    volumes:
      - flipturn_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flipturn -d flipturn']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flipturn-redis
    restart: unless-stopped
    ports:
      # Mapped to 56379 to avoid colliding with a host-installed Redis.
      - '56379:6379'
    volumes:
      - flipturn_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  flipturn_pgdata:
  flipturn_redisdata:
