name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: typecheck + lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm format:check

  test:
    name: tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # The api/workers test helpers shell out to `docker exec
      # flipturn-postgres ...` against the container brought up by the compose
      # step below; these URLs match `compose.dev.yaml`'s host port mappings.
      DATABASE_URL: postgresql://flipturn:flipturn_dev@localhost:55432/flipturn?schema=public
      REDIS_URL: redis://localhost:56379
      # The api env schema declares these as `z.string().transform(empty -> undefined)`,
      # so they must be present (even empty) in process.env or `getEnv()` exits 1.
      SENTRY_DSN: ''
      RESEND_API_KEY: ''
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Bring up Postgres + Redis
        run: docker compose -f compose.dev.yaml up -d --wait

      - run: pnpm test

      - name: Compose logs on failure
        if: failure()
        run: docker compose -f compose.dev.yaml logs --no-color
