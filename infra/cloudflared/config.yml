# Cloudflare Tunnel config for the Flip Turn API.
#
# Live config — the tunnel was created on the Mac Mini (deploy user: hank)
# with `cloudflared tunnel create flipturn-prod`, and the UUID + credentials
# path below are baked in. To deploy:
#   1. Copy this file to ~/.config/cloudflared/config.yml on the Mac Mini.
#   2. Confirm the credentials JSON exists at the path below.
#   3. Route DNS:
#        cloudflared tunnel route dns flipturn-prod api.flipturn.ca
#      (creates a CNAME api.flipturn.ca -> <UUID>.cfargotunnel.com)
#   4. Test: cloudflared tunnel run flipturn-prod
#      Then curl https://api.flipturn.ca/v1/health  ->  {"db":"ok","redis":"ok"}
#   5. Wire into pm2: see infra/pm2/ecosystem.config.cjs

tunnel: 1431a0f0-ad42-43a7-a435-c5fa44a28a71
credentials-file: /Users/hank/.cloudflared/1431a0f0-ad42-43a7-a435-c5fa44a28a71.json

ingress:
  - hostname: api.flipturn.ca
    service: http://localhost:3000

  # Apex `flipturn.ca` is the user-facing surface (magic-link landing
  # page at `/auth`, future Universal Links AASA at
  # `/.well-known/apple-app-site-association`, etc.). It routes to the
  # same Hono process; the api inspects the path, not the Host header.
  - hostname: flipturn.ca
    service: http://localhost:3000

  # Catch-all (required by cloudflared)
  - service: http_status:404
